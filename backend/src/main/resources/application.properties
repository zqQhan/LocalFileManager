# ============================================================
# File Manager — Quarkus Backend Configuration
# ============================================================

# --- Server ---
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info

# --- Dev mode ---
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."com.nick".level=DEBUG

# --- OpenAPI / Swagger ---
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui

# --- Database: PostgreSQL (Reactive) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=fmuser
quarkus.datasource.password=fmpass
quarkus.datasource.reactive.url=postgresql://localhost:5432/filemanager
%prod.quarkus.datasource.reactive.url=postgresql://localhost:5432/filemanager

# Hibernate — auto-create tables in dev, validate in prod
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import-dev.sql

# --- Redis ---
quarkus.redis.hosts=redis://localhost:6379
%dev.quarkus.redis.hosts=redis://localhost:6379
# TTL for search cache (seconds)
filemanager.redis.search-cache-ttl=300

# --- Kafka ---
%dev.kafka.bootstrap.servers=localhost:9092
%prod.kafka.bootstrap.servers=localhost:9092

# Kafka topics
filemanager.kafka.topics.file-index=file-index-queue
filemanager.kafka.topics.batch-tasks=batch-tasks
filemanager.kafka.topics.search-logs=search-logs
filemanager.kafka.topics.file-ops=file-ops
filemanager.kafka.topics.dedup-scan=dedup-scan

# Incoming channels (consumers) — require value.deserializer
mp.messaging.incoming.file-index-in.connector=smallrye-kafka
mp.messaging.incoming.file-index-in.topic=${filemanager.kafka.topics.file-index}
mp.messaging.incoming.file-index-in.auto.offset.reset=earliest
mp.messaging.incoming.file-index-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.incoming.batch-tasks-in.connector=smallrye-kafka
mp.messaging.incoming.batch-tasks-in.topic=${filemanager.kafka.topics.batch-tasks}
mp.messaging.incoming.batch-tasks-in.auto.offset.reset=earliest
mp.messaging.incoming.batch-tasks-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.incoming.dedup-scan-in.connector=smallrye-kafka
mp.messaging.incoming.dedup-scan-in.topic=${filemanager.kafka.topics.dedup-scan}
mp.messaging.incoming.dedup-scan-in.auto.offset.reset=earliest
mp.messaging.incoming.dedup-scan-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Outgoing channels (producers) — require value.serializer
mp.messaging.outgoing.file-index-out.connector=smallrye-kafka
mp.messaging.outgoing.file-index-out.topic=${filemanager.kafka.topics.file-index}
mp.messaging.outgoing.file-index-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.batch-tasks-out.connector=smallrye-kafka
mp.messaging.outgoing.batch-tasks-out.topic=${filemanager.kafka.topics.batch-tasks}
mp.messaging.outgoing.batch-tasks-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.search-logs-out.connector=smallrye-kafka
mp.messaging.outgoing.search-logs-out.topic=${filemanager.kafka.topics.search-logs}
mp.messaging.outgoing.search-logs-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.file-ops-out.connector=smallrye-kafka
mp.messaging.outgoing.file-ops-out.topic=${filemanager.kafka.topics.file-ops}
mp.messaging.outgoing.file-ops-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.dedup-scan-out.connector=smallrye-kafka
mp.messaging.outgoing.dedup-scan-out.topic=${filemanager.kafka.topics.dedup-scan}
mp.messaging.outgoing.dedup-scan-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- Path safety guard ---
# protected paths — never allow write/delete on these
filemanager.guard.blacklist=C:\\Windows,C:\\Program Files,C:\\Program Files (x86)
# whitelist — if set, ONLY allow operations under these paths (empty = allow all)
# filemanager.guard.whitelist=C:\\Users,E:\\local,E:\\projects

# --- File Manager specific ---
filemanager.index.root-paths=C:\\Users\\${user.name}
filemanager.search.max-results=100
filemanager.content.preview.max-chars=2000
